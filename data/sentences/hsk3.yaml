# HSK 3.0 三级句子集（只用一至三级词汇；目标：覆盖三级 953 词 95%+，零超纲）
# 校验： python scripts/hsk_validate.py --level 3
level: 3
sentences:
  # —— 人称与身份 ——
  - { chinese: "我父亲是工程师，母亲是公务员。", en: "My father is an engineer and my mother is a civil servant.", grammar: [] }
  - { chinese: "这位姑娘是有名的歌手。", en: "This young lady is a famous singer.", grammar: [] }
  - { chinese: "那位老太太是我的亲人。", en: "That old lady is my relative.", grammar: [] }
  - { chinese: "他是我们部门的领导。", en: "He is the leader of our department.", grammar: [] }
  - { chinese: "李主任是一位专家。", en: "Director Li is an expert.", grammar: [] }
  - { chinese: "记者正在现场报道。", en: "The reporter is reporting live from the scene.", grammar: [] }
  - { chinese: "警察和交警都在路口工作。", en: "Police and traffic police both work at the intersection.", grammar: [] }
  - { chinese: "大夫让我多休息。", en: "The doctor told me to rest more.", grammar: [] }
  - { chinese: "服务员给我们拿来了菜单。", en: "The waiter brought us the menu.", grammar: [] }
  - { chinese: "志愿者们帮助老百姓解决困难。", en: "Volunteers help ordinary people solve difficulties.", grammar: [] }
  - { chinese: "他是这家工厂的老板。", en: "He is the boss of this factory.", grammar: [] }
  - { chinese: "员工们对工资很满意。", en: "The employees are satisfied with their pay.", grammar: [] }
  - { chinese: "我爷爷去年退休了。", en: "My grandpa retired last year.", grammar: [] }
  - { chinese: "她是个人才，能力很强。", en: "She is a talent with strong abilities.", grammar: [] }
  - { chinese: "部长派代表访问了三个国家。", en: "The minister sent representatives to visit three countries.", grammar: [] }
  - { chinese: "导演和演员们都在舞台上。", en: "The director and actors are all on stage.", grammar: [] }
  - { chinese: "球迷和歌迷都很热情。", en: "Sports fans and music fans are all enthusiastic.", grammar: [] }
  - { chinese: "他是这本书的作者。", en: "He is the author of this book.", grammar: [] }
  - { chinese: "观众们都站了起来。", en: "The audience all stood up.", grammar: [] }
  - { chinese: "选手们的实力都很强。", en: "The contestants are all very strong.", grammar: [] }
  - { chinese: "每个公民都有自己的责任。", en: "Every citizen has their own responsibility.", grammar: [] }
  - { chinese: "他性格积极，个性很强。", en: "He has a positive character and strong personality.", grammar: [] }
  - { chinese: "她是一位伟大的母亲。", en: "She is a great mother.", grammar: [] }
  - { chinese: "这孩子很有本领。", en: "This kid is very capable.", grammar: [] }
  - { chinese: "他有本事，也有才能。", en: "He has both skill and talent.", grammar: [] }
  - { chinese: "他是我的熟人。", en: "He is an acquaintance of mine.", grammar: [] }
  - { chinese: "男子队和女子队都赢了。", en: "Both the men's and women's teams won.", grammar: [] }
  - { chinese: "华人在全球各地生活。", en: "Chinese people live all over the world.", grammar: [] }

  # —— 家庭 ——
  - { chinese: "我的父母都在农村生活。", en: "My parents both live in the countryside.", grammar: [] }
  - { chinese: "他们两个人去年结婚了。", en: "The two of them got married last year.", grammar: [] }
  - { chinese: "听说他们离婚了。", en: "I heard they divorced.", grammar: [] }
  - { chinese: "她还没有结婚的对象。", en: "She doesn't have a marriage partner yet.", grammar: [] }
  - { chinese: "子女应该照顾父母。", en: "Children should take care of their parents.", grammar: [] }
  - { chinese: "我家买了新家具和沙发。", en: "My family bought new furniture and a sofa.", grammar: [] }
  - { chinese: "屋子里安装了空调。", en: "An air conditioner was installed in the room.", grammar: [] }
  - { chinese: "我把被子放在床上了。", en: "I put the quilt on the bed.", grammar: ["把字句"] }
  - { chinese: "房东把房租提高了。", en: "The landlord raised the rent.", grammar: ["把字句"] }
  - { chinese: "我的家乡是一个小村子。", en: "My hometown is a small village.", grammar: [] }
  - { chinese: "故乡的景色很美丽。", en: "The scenery of my hometown is beautiful.", grammar: [] }
  - { chinese: "全家人一起整理了屋子。", en: "The whole family tidied the house together.", grammar: [] }
  - { chinese: "搬家的时候，家具都要搬走。", en: "When moving, all furniture must be moved.", grammar: [] }
  - { chinese: "我们的生活越来越幸福。", en: "Our life is happier and happier.", grammar: [] }
  - { chinese: "家庭给了我温暖和力量。", en: "Family gives me warmth and strength.", grammar: [] }

  # —— 数字、年龄、量 ——
  - { chinese: "我买了两张电影票。", en: "I bought two movie tickets.", grammar: [] }
  - { chinese: "她有一双漂亮的鞋。", en: "She has a pair of pretty shoes.", grammar: [] }
  - { chinese: "这种水果很甜。", en: "This kind of fruit is sweet.", grammar: [] }
  - { chinese: "每个人有两千块钱左右。", en: "Each person has about two thousand yuan.", grammar: [] }
  - { chinese: "我们班共有四十名学生。", en: "Our class has forty students in total.", grammar: [] }
  - { chinese: "这类问题很普遍。", en: "This type of problem is common.", grammar: [] }
  - { chinese: "一群孩子在桥上玩儿。", en: "A group of kids are playing on the bridge.", grammar: [] }
  - { chinese: "他送了我一束花。", en: "He gave me a bouquet of flowers.", grammar: [] }
  - { chinese: "一台电脑一万块左右。", en: "A computer costs around ten thousand yuan.", grammar: [] }
  - { chinese: "请给我一支笔和一张纸。", en: "Please give me a pen and a sheet of paper.", grammar: [] }
  - { chinese: "大概有一千万人观看了直播。", en: "About ten million people watched the livestream.", grammar: [] }
  - { chinese: "门票大约一百美元。", en: "The ticket is about 100 US dollars.", grammar: [] }
  - { chinese: "这部电影的票价不高。", en: "The ticket price of this movie is not high.", grammar: [] }
  - { chinese: "我们吃了一顿美食。", en: "We had a delicious meal.", grammar: [] }
  - { chinese: "他跑了几步就停了。", en: "He ran a few steps and stopped.", grammar: [] }
  - { chinese: "这期杂志很精彩。", en: "This issue of the magazine is wonderful.", grammar: [] }
  - { chinese: "一架飞机从天空飞过。", en: "A plane flew across the sky.", grammar: [] }
  - { chinese: "整个上午他都在写作。", en: "He spent the whole morning writing.", grammar: [] }
  - { chinese: "商品的数量和价格都合理。", en: "The quantity and prices of the goods are reasonable.", grammar: [] }
  - { chinese: "这个房间的面积不大。", en: "The area of this room is not large.", grammar: [] }
  - { chinese: "男女比例差不多。", en: "The ratio of men to women is about equal.", grammar: [] }

  # —— 时间与日期 ——
  - { chinese: "目前的情况基本正常。", en: "The current situation is basically normal.", grammar: [] }
  - { chinese: "从前这里是农村，现在是城市。", en: "This used to be countryside; now it's a city.", grammar: [] }
  - { chinese: "将来我想从事艺术工作。", en: "In the future I want to work in the arts.", grammar: [] }
  - { chinese: "从年初到年底，他一直很忙。", en: "From the start to the end of the year, he was busy.", grammar: [] }
  - { chinese: "国庆的时候，广场上人特别多。", en: "During National Day, the square is especially crowded.", grammar: [] }
  - { chinese: "古代和现代的文化很不同。", en: "Ancient and modern cultures are very different.", grammar: [] }
  - { chinese: "后年我打算去留学。", en: "I plan to study abroad the year after next.", grammar: [] }
  - { chinese: "近期天气变化很大。", en: "The weather has changed a lot recently.", grammar: [] }
  - { chinese: "当初我不理解他，现在明白了。", en: "At first I didn't understand him; now I do.", grammar: [] }
  - { chinese: "自从搬家以后，我很少见到他。", en: "Since moving, I rarely see him.", grammar: [] }
  - { chinese: "至今我还记得那个时刻。", en: "To this day I still remember that moment.", grammar: [] }
  - { chinese: "他曾经是一名队员。", en: "He was once a team member.", grammar: [] }
  - { chinese: "二十一世纪是科技的时代。", en: "The 21st century is an era of technology.", grammar: [] }
  - { chinese: "那个年代，生活很困难。", en: "In that era, life was hard.", grammar: [] }
  - { chinese: "他年纪大了，但身体结实。", en: "He is old but sturdy.", grammar: [] }
  - { chinese: "我们定期开会。", en: "We hold meetings regularly.", grammar: [] }
  - { chinese: "他整天整整忙了十二个小时。", en: "He was busy a full twelve hours all day.", grammar: [] }

  # —— 学校与工作 ——
  - { chinese: "我上初中一年级，功课不少。", en: "I'm in the first year of junior high with plenty of homework.", grammar: [] }
  - { chinese: "这个课程的教材有点儿难。", en: "The textbook for this course is a bit hard.", grammar: [] }
  - { chinese: "试题和题目都不难。", en: "The exam questions are not difficult.", grammar: [] }
  - { chinese: "我的听力进步了。", en: "My listening has improved.", grammar: [] }
  - { chinese: "老师提问，我们回答。", en: "The teacher asks, we answer.", grammar: [] }
  - { chinese: "请大家先预习第五课。", en: "Please preview lesson five first.", grammar: [] }
  - { chinese: "学费一年两万块。", en: "Tuition is twenty thousand yuan a year.", grammar: [] }
  - { chinese: "他的专业是文学。", en: "His major is literature.", grammar: [] }
  - { chinese: "明天有一个重要的会议。", en: "There is an important meeting tomorrow.", grammar: [] }
  - { chinese: "请把报告交给主任。", en: "Please hand the report to the director.", grammar: ["把字句"] }
  - { chinese: "我们部门负责这个任务。", en: "Our department is responsible for this task.", grammar: [] }
  - { chinese: "他工作很主动，也很自觉。", en: "He works proactively and self-consciously.", grammar: [] }
  - { chinese: "大家共同完成了任务。", en: "Everyone completed the task together.", grammar: [] }
  - { chinese: "经理安排我接待客人。", en: "The manager arranged for me to receive guests.", grammar: [] }
  - { chinese: "他亲自处理了这件事。", en: "He handled this matter personally.", grammar: [] }
  - { chinese: "我们讨论并且通过了这个建议。", en: "We discussed and approved this suggestion.", grammar: [] }
  - { chinese: "领导同意了我的主张。", en: "The leader agreed with my proposal.", grammar: [] }
  - { chinese: "请在表格上写清楚姓名。", en: "Please write your name clearly on the form.", grammar: [] }
  - { chinese: "文件的标题要明确。", en: "The document title should be clear.", grammar: [] }
  - { chinese: "请复印三份文件。", en: "Please photocopy three copies of the document.", grammar: [] }
  - { chinese: "把电子邮件发到我的邮箱。", en: "Send the email to my mailbox.", grammar: ["把字句"] }
  - { chinese: "信封上有一张邮票。", en: "There is a stamp on the envelope.", grammar: [] }
  - { chinese: "办理手续需要身份证。", en: "You need an ID card to complete the procedures.", grammar: [] }
  - { chinese: "他有当医生的资格。", en: "He is qualified to be a doctor.", grammar: [] }
  - { chinese: "这份工作要求有经验。", en: "This job requires experience.", grammar: [] }
  - { chinese: "就业是重要的社会话题。", en: "Employment is an important social topic.", grammar: [] }
  - { chinese: "他去国外留学，学习先进技术。", en: "He studies abroad to learn advanced technology.", grammar: [] }
  - { chinese: "实验室里正在做实验。", en: "An experiment is underway in the lab.", grammar: [] }
  - { chinese: "我们要打好基础。", en: "We must build a good foundation.", grammar: [] }
  - { chinese: "理论要结合实际。", en: "Theory should be combined with practice.", grammar: [] }
  - { chinese: "他的知识很丰富。", en: "His knowledge is rich.", grammar: [] }
  - { chinese: "工人们在工厂里生产商品。", en: "Workers produce goods in the factory.", grammar: [] }
  - { chinese: "农民在农村从事农业。", en: "Farmers do agriculture in the countryside.", grammar: [] }
  - { chinese: "工业和商业都发展得很快。", en: "Industry and commerce both develop fast.", grammar: [] }
  - { chinese: "公司的生意越来越好。", en: "The company's business is getting better.", grammar: [] }
  - { chinese: "他创业成功，成立了自己的公司。", en: "He started a business successfully and founded his own company.", grammar: [] }
  - { chinese: "我们要不断创新。", en: "We must keep innovating.", grammar: [] }

  # —— 地点与方位 ——
  - { chinese: "书的上面有一张图。", en: "There is a picture on top of the book.", grammar: [] }
  - { chinese: "桌子下面和底下都很干净。", en: "Under the table it is clean.", grammar: [] }
  - { chinese: "房子里面很暖和，外面很冷。", en: "It's warm inside the house and cold outside.", grammar: [] }
  - { chinese: "学校前面有一座桥。", en: "There is a bridge in front of the school.", grammar: [] }
  - { chinese: "他站在我背后。", en: "He stood behind me.", grammar: [] }
  - { chinese: "公园周围有很多商店。", en: "There are many shops around the park.", grammar: [] }
  - { chinese: "人群当中有一位老人。", en: "Among the crowd is an old man.", grammar: [] }
  - { chinese: "中国的西部有很多山。", en: "There are many mountains in western China.", grammar: [] }
  - { chinese: "东部和南部的经济发达。", en: "The east and south have developed economies.", grammar: [] }
  - { chinese: "北部和中部气候不同。", en: "The north and the center have different climates.", grammar: [] }
  - { chinese: "眼前是一片美丽的景色。", en: "Before my eyes is beautiful scenery.", grammar: [] }
  - { chinese: "当地的特色美食很有名。", en: "The local specialty food is famous.", grammar: [] }
  - { chinese: "他在国内工作，没去国外。", en: "He works domestically and hasn't gone abroad.", grammar: [] }
  - { chinese: "首都的地铁很方便。", en: "The subway in the capital is convenient.", grammar: [] }
  - { chinese: "大使馆在这个区。", en: "The embassy is in this district.", grammar: [] }
  - { chinese: "这个地区的面积很大。", en: "This region has a large area.", grammar: [] }
  - { chinese: "长城是伟大的建设成果。", en: "The Great Wall is a great construction achievement.", grammar: [] }

  # —— 出行与交通 ——
  - { chinese: "我们坐火车经过了高速公路和铁路大桥。", en: "Our train passed the expressway and a railway bridge.", grammar: [] }
  - { chinese: "请把行李放在上面。", en: "Please put the luggage on top.", grammar: ["把字句"] }
  - { chinese: "过海关要打开行李。", en: "You must open your luggage at customs.", grammar: [] }
  - { chinese: "我们住在一家小旅馆。", en: "We stayed at a small hotel.", grammar: [] }
  - { chinese: "旅行社安排了路线。", en: "The travel agency arranged the route.", grammar: [] }
  - { chinese: "我们按照路线前往首都。", en: "We headed to the capital following the route.", grammar: [] }
  - { chinese: "飞机很快就到达了。", en: "The plane arrived soon.", grammar: [] }
  - { chinese: "他朝车站的方向走去。", en: "He walked toward the station.", grammar: [] }
  - { chinese: "路上要注意安全。", en: "Pay attention to safety on the road.", grammar: [] }
  - { chinese: "他开车的速度太快了。", en: "He drives too fast.", grammar: [] }
  - { chinese: "前面发生了交通事故。", en: "A traffic accident happened ahead.", grammar: [] }
  - { chinese: "警察正在处理事故。", en: "The police are handling the accident.", grammar: [] }
  - { chinese: "我们提前一个小时出发吧。", en: "Let's set off an hour early.", grammar: [] }
  - { chinese: "他赶到机场的时候，飞机已经起飞了。", en: "When he rushed to the airport, the plane had taken off.", grammar: [] }
  - { chinese: "我们去划船吧。", en: "Let's go boating.", grammar: [] }

  # —— 购物与钱 ——
  - { chinese: "这件衬衫的价格很合理。", en: "The price of this shirt is reasonable.", grammar: [] }
  - { chinese: "她买了一条裙子和一条短裤。", en: "She bought a skirt and a pair of shorts.", grammar: [] }
  - { chinese: "这件上衣是有名的牌子。", en: "This top is a famous brand.", grammar: [] }
  - { chinese: "我可以用现金或者人民币支付。", en: "I can pay in cash or RMB.", grammar: [] }
  - { chinese: "这个皮包的价钱太高了。", en: "This leather bag is too expensive.", grammar: [] }
  - { chinese: "市场上的商品很丰富。", en: "The market has a rich variety of goods.", grammar: [] }
  - { chinese: "买保险要看清楚费用。", en: "When buying insurance, read the fees carefully.", grammar: [] }
  - { chinese: "他把钱存在银行里。", en: "He keeps his money in the bank.", grammar: ["把字句"] }
  - { chinese: "这次交易的价值很大。", en: "This deal is of great value.", grammar: [] }
  - { chinese: "消费之前，先判断商品的价值。", en: "Before spending, judge the value of the goods first.", grammar: [] }
  - { chinese: "衣服和服装店都在二层。", en: "Clothes and clothing stores are on the second floor.", grammar: [] }

  # —— 饮食 ——
  - { chinese: "我早上喝咖啡，晚上喝绿茶。", en: "I drink coffee in the morning and green tea at night.", grammar: [] }
  - { chinese: "请来一杯奶茶和一杯果汁。", en: "A milk tea and a juice, please.", grammar: [] }
  - { chinese: "苹果和香蕉都很有营养。", en: "Apples and bananas are both nutritious.", grammar: [] }
  - { chinese: "这个汤有点儿甜。", en: "This soup is a bit sweet.", grammar: [] }
  - { chinese: "少吃糖对身体好。", en: "Eating less sugar is good for you.", grammar: [] }
  - { chinese: "他喝了一杯啤酒和一杯红酒。", en: "He drank a beer and a glass of red wine.", grammar: [] }
  - { chinese: "白菜是常见的菜。", en: "Chinese cabbage is a common vegetable.", grammar: [] }
  - { chinese: "红茶和可乐，你要哪个？", en: "Black tea or cola, which do you want?", grammar: [] }
  - { chinese: "这里的食品都合格。", en: "The food here is all up to standard.", grammar: [] }
  - { chinese: "当地美食很有特色。", en: "The local cuisine is distinctive.", grammar: [] }

  # —— 天气与状态 ——
  - { chinese: "今天很暖和，阳光很好。", en: "It's warm today with nice sunshine.", grammar: [] }
  - { chinese: "天空中一片光明。", en: "The sky is bright.", grammar: [] }
  - { chinese: "这里的气候比较暖和。", en: "The climate here is relatively warm.", grammar: [] }
  - { chinese: "突然下起了大雨。", en: "It suddenly started pouring.", grammar: [] }
  - { chinese: "天气预报说明天晴。", en: "The forecast says tomorrow will be sunny.", grammar: [] }
  - { chinese: "外面很静，一点儿声音都没有。", en: "It's quiet outside, not a sound.", grammar: [] }

  # —— 健康与身体 ——
  - { chinese: "我感冒了，头很痛。", en: "I caught a cold and my head hurts.", grammar: [] }
  - { chinese: "他受伤了，伤得不重。", en: "He got injured, but not seriously.", grammar: [] }
  - { chinese: "他手指上的伤好了。", en: "The wound on his finger has healed.", grammar: [] }
  - { chinese: "多运动可以预防生病。", en: "Exercise helps prevent illness.", grammar: [] }
  - { chinese: "他的手指流血了，还好伤不重。", en: "His finger bled, but luckily the injury is light.", grammar: [] }
  - { chinese: "心里的压力太大对健康不好。", en: "Too much mental pressure is bad for health.", grammar: [] }
  - { chinese: "烟对身体的危害很大。", en: "Smoking greatly harms the body.", grammar: [] }
  - { chinese: "卫生间要保持卫生。", en: "The bathroom should be kept clean.", grammar: [] }
  - { chinese: "他每天跑步，身体结实。", en: "He runs every day and is strong.", grammar: [] }
  - { chinese: "医生给病人做了检查，情况正常。", en: "The doctor examined the patient; everything is normal.", grammar: [] }

  # —— 运动与文娱 ——
  - { chinese: "今晚有一场足球比赛。", en: "There is a football match tonight.", grammar: [] }
  - { chinese: "我们队进入了决赛。", en: "Our team entered the finals.", grammar: [] }
  - { chinese: "他得了金牌，她得了银牌。", en: "He won gold and she won silver.", grammar: [] }
  - { chinese: "我们队赢了，他们队输了。", en: "Our team won and theirs lost.", grammar: [] }
  - { chinese: "他在世界杯上得分最多。", en: "He scored the most in the World Cup.", grammar: [] }
  - { chinese: "教练带领队员们训练。", en: "The coach leads the players in training.", grammar: [] }
  - { chinese: "他跳高和跳远都很好。", en: "He is good at both high jump and long jump.", grammar: [] }
  - { chinese: "我周末去游泳，你去跳舞吗？", en: "I'll swim this weekend; will you go dancing?", grammar: [] }
  - { chinese: "演唱会上，歌手唱了很多歌。", en: "At the concert, the singer sang many songs.", grammar: [] }
  - { chinese: "乐队的演出非常精彩。", en: "The band's performance was wonderful.", grammar: [] }
  - { chinese: "这部电视剧是一部连续剧。", en: "This TV drama is a series.", grammar: [] }
  - { chinese: "电视台晚上播出新闻。", en: "The TV station broadcasts news at night.", grammar: [] }
