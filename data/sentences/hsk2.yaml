level: 2
sentences:
  # —— 问候与礼貌 ——
  - { chinese: "欢迎大家来我们学校！", en: "Welcome everyone to our school!", grammar: ["欢迎"] }
  - { chinese: "晚安，明天见。", en: "Good night, see you tomorrow.", grammar: ["晚安"] }
  - { chinese: "不好意思，我来晚了。", en: "Sorry, I'm late.", grammar: ["不好意思"] }
  - { chinese: "谢谢你的帮助。", en: "Thank you for your help.", grammar: ["帮助"] }
  - { chinese: "一路顺风，早点儿回来！", en: "Have a good trip, come back soon!", grammar: ["一路顺风"] }
  - { chinese: "一路平安，到了给我打电话。", en: "Safe travels, call me when you arrive.", grammar: ["一路平安"] }
  - { chinese: "大家好，我来介绍一下自己。", en: "Hello everyone, let me introduce myself.", grammar: ["自己"] }
  - { chinese: "请大家安静，先听我讲。", en: "Please be quiet everyone, listen to me first.", grammar: ["安静", "讲"] }
  - { chinese: "喂，你好，请问是哪位？", en: "Hello, may I ask who is calling?", grammar: ["喂"] }
  - { chinese: "好久不见，你去哪儿了？", en: "Long time no see, where have you been?", grammar: ["好久"] }

  # —— 人称与身份 ——
