  - { chinese: "这位作家写了很多小说。", en: "This writer has written many novels.", grammar: ["作家", "小说"] }
  - { chinese: "那个司机开车很小心。", en: "That driver drives very carefully.", grammar: ["司机", "小心"] }
  - { chinese: "咱们都是同事，别客气。", en: "We are all colleagues, don't be so polite.", grammar: ["咱们", "同事"] }
  - { chinese: "它是我家的猫，它们是我家的狗。", en: "It is my cat, they are my dogs.", grammar: ["它 / 它们"] }
