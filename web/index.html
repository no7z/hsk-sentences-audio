<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>chinese-sentences-audio · 浏览器</title>
<style>
  :root { --bg:#faf9f7; --card:#fff; --ink:#1a1a1a; --sub:#6b6b6b; --accent:#c0392b; --line:#ececec; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); color:var(--ink); }
  header { padding:24px 20px 12px; }
  h1 { margin:0; font-size:20px; }
  .sub { color:var(--sub); font-size:13px; margin-top:4px; }
  .bar { position:sticky; top:0; background:var(--bg); padding:12px 20px; border-bottom:1px solid var(--line);
         display:flex; gap:10px; flex-wrap:wrap; align-items:center; z-index:5; }
  input, select { padding:8px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; background:#fff; }
  input { flex:1; min-width:180px; }
  .count { color:var(--sub); font-size:13px; }
  main { padding:16px 20px 60px; display:grid; gap:12px; max-width:820px; margin:0 auto; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .zh { font-size:24px; font-weight:600; letter-spacing:1px; }
  .py { color:var(--accent); font-size:15px; margin-top:6px; }
  .en { color:var(--sub); font-size:14px; margin-top:6px; }
  .toks { margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; }
  .tok { background:#f4f2ef; border-radius:6px; padding:4px 8px; font-size:12px; color:#444; }
  .tok b { color:var(--ink); font-size:14px; font-weight:600; }
  .row { display:flex; gap:10px; align-items:center; margin-top:12px; }
  button { border:none; background:var(--accent); color:#fff; padding:7px 14px; border-radius:8px;
           font-size:13px; cursor:pointer; }
  button.ghost { background:#efecea; color:#333; }
  .tags { margin-top:8px; }
  .tag { display:inline-block; background:#eef4ff; color:#2c5aa0; font-size:11px; padding:2px 8px;
         border-radius:10px; margin-right:6px; }
  .err { max-width:820px; margin:40px auto; padding:20px; background:#fff3f2; border:1px solid #f3c6c1;
         border-radius:10px; color:#a03028; font-size:14px; line-height:1.6; }
  code { background:#00000010; padding:1px 6px; border-radius:4px; }
</style>
</head>
<body>
<header>
  <h1>chinese-sentences-audio</h1>
  <div class="sub">中文分级句子 · 拼音 · 翻译 · 逐词词义 · 原生音频 · HSK 分级</div>
</header>
<div class="bar">
  <input id="q" placeholder="搜索汉字 / 拼音 / 英文…">
  <select id="lvl"><option value="">全部等级</option></select>
  <span class="count" id="count"></span>
</div>
<main id="list"></main>

<script>
const DATA_URL = "../dist/sentences.json";
const AUDIO_BASE = "../dist/";
let ALL = [];

function render(items) {
  const list = document.getElementById("list");
  list.innerHTML = "";
  document.getElementById("count").textContent = items.length + " 句";
  for (const r of items) {
    const card = document.createElement("div");
    card.className = "card";
    const toks = r.tokens.map(t =>
      `<span class="tok"><b>${t.word}</b> ${t.pinyin}${t.gloss_en ? " · " + t.gloss_en : ""}</span>`).join("");
    const tags = (r.grammar_points || []).map(g => `<span class="tag">${g}</span>`).join("");
    card.innerHTML = `
      <div class="zh">${r.chinese}</div>
      <div class="py">${r.pinyin}</div>
      <div class="en">${r.translation?.en || ""}　·　繁：${r.traditional}</div>
      <div class="toks">${toks}</div>
      ${tags ? `<div class="tags">${tags}</div>` : ""}
      <div class="row">
        <button data-a="${AUDIO_BASE + r.audio.normal}">▶ 常速</button>
        <button class="ghost" data-a="${AUDIO_BASE + r.audio.slow}">▶ 慢速</button>
        <span class="count">HSK ${r.hsk_level} · ${r.id}</span>
      </div>`;
    list.appendChild(card);
  }
  list.querySelectorAll("button").forEach(b =>
    b.onclick = () => new Audio(b.dataset.a).play());
}

function applyFilter() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const lvl = document.getElementById("lvl").value;
  render(ALL.filter(r => {
    if (lvl && String(r.hsk_level) !== lvl) return false;
    if (!q) return true;
    const hay = (r.chinese + r.pinyin + (r.translation?.en || "") +
      r.tokens.map(t => t.word + t.pinyin + t.gloss_en).join("")).toLowerCase();
    return hay.includes(q);
  }));
}

fetch(DATA_URL).then(r => r.json()).then(data => {
  ALL = data;
  const levels = [...new Set(data.map(r => r.hsk_level))].sort();
  const sel = document.getElementById("lvl");
  levels.forEach(l => { const o = document.createElement("option"); o.value = l; o.textContent = "HSK " + l; sel.appendChild(o); });
  document.getElementById("q").oninput = applyFilter;
  sel.onchange = applyFilter;
  render(ALL);
}).catch(() => {
  document.body.insertAdjacentHTML("beforeend",
    `<div class="err">无法加载 <code>${DATA_URL}</code>。<br>浏览器 <code>file://</code> 直接打开会被 CORS 拦截，请在仓库根目录起本地服务：<br><code>python -m http.server</code> 然后访问 <code>http://localhost:8000/web/</code></div>`);
});
</script>
</body>
</html>
